<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Shop</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

header{
    background:#ff4d4d;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.products{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.product{
    background:white;
    padding:15px;
    border-radius:10px;
    width:250px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
    width:100%;
    border-radius:10px;
}

button{
    background:#25D366;
    color:white;
    border:none;
    padding:10px;
    margin-top:10px;
    width:100%;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#1ebc59;
}

.cart{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}
</style>

</head>
<body>

<header>
<h1>My Pizza Shop</h1>
<p>Order fresh pizza on WhatsApp</p>
</header>

<div class="container">

<div class="products">

<div class="product">
<img src="pizza1.jpg">
<h3>Margherita Pizza</h3>
<p>₹199</p>
<button onclick="addToCart('Margherita Pizza',199)">Add to Cart</button>
</div>

<div class="product">
<img src="pizza2.jpg">
<h3>Farmhouse Pizza</h3>
<p>₹249</p>
<button onclick="addToCart('Farmhouse Pizza',249)">Add to Cart</button>
</div>

<div class="product">
<img src="pizza3.jpg">
<h3>Veggie Pizza</h3>
<p>₹229</p>
<button onclick="addToCart('Veggie Pizza',229)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>

<ul id="cartList"></ul>

<p><b>Total: ₹<span id="total">0</span></b></p>

<input type="text" id="name" placeholder="Enter your name">

<input type="text" id="phone" placeholder="Enter your phone number">

<button onclick="orderWhatsApp()">Order on WhatsApp</button>

</div>

</div>

<script>

let cart = [];
let total = 0;

function addToCart(name, price){
    cart.push({name, price});
    total += price;
    updateCart();
}

function updateCart(){
    let cartList = document.getElementById("cartList");
    cartList.innerHTML = "";

    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerText = item.name + " - ₹" + item.price;
        cartList.appendChild(li);
    });

    document.getElementById("total").innerText = total;
}

function orderWhatsApp(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if(name=="" || phone==""){
        alert("Please enter name and phone");
        return;
    }

    let message = "New Order:%0A";
    message += "Name: " + name + "%0A";
    message += "Phone: " + phone + "%0A%0A";

    cart.forEach(item=>{
        message += item.name + " - ₹" + item.price + "%0A";
    });

    message += "%0ATotal: ₹" + total;

    let ownerNumber = "919876543210"; // CHANGE THIS

    let url = "https://wa.me/" + ownerNumber + "?text=" + message;

    window.open(url, "_blank");
}

</script>

</body>
</html>
